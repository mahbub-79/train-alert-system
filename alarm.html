<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm System</title>
  <style>
    :root{
      --bg:#07131f;
      --panel:#102338;
      --line:rgba(255,255,255,.08);
      --text:#eef5ff;
      --muted:#c7d5e5;
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(239,68,68,.16), transparent 28%),
        linear-gradient(180deg, #07131f 0%, #091827 100%);
    }
    .panel{
      width:min(760px, 100%);
      background:linear-gradient(180deg, rgba(16,35,56,.96), rgba(10,24,37,.98));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:34px 26px;
      text-align:center;
    }
    .pill{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.28);
      color:#ffc9c9;
      font-weight:700;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 14px;
      font-size:clamp(2rem, 4vw, 3rem);
    }
    p{
      margin:0 auto;
      max-width:560px;
      color:var(--muted);
      font-size:1.15rem;
      line-height:1.8;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="pill">Alarm System</div>
    <h1>Warning Alert</h1>
    <p>Be careful, there is a train near you. Keep a safe distance from the railway track.</p>
  </section>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        const audio = new Audio("alarm.mp3");
        audio.loop = true;
        audio.play().catch(() => {});
        setTimeout(() => {
          audio.pause();
          audio.currentTime = 0;
        }, 40000);
      }, 10000);
    });
  </script>
</body>
</html>
