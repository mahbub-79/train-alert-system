<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm System</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial, sans-serif;
      color:white;
      background:#07131f;
    }
    .box{
      text-align:center;
      max-width:600px;
      padding:30px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.1);
    }
    h1{margin-bottom:10px;}
    p{font-size:18px; line-height:1.6;}
  </style>
</head>
<body>
  <div class="box">
    <h1>Warning Alert</h1>
    <p>Be careful, there is a train near you. Keep a safe distance from the railway track.</p>
  </div>

<script>
function playDangerAlarm(duration = 40000){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const gain = ctx.createGain();
  gain.gain.value = 0.2;
  gain.connect(ctx.destination);

  let t = ctx.currentTime;
  let end = t + duration/1000;

  while(t < end){
    let osc = ctx.createOscillator();
    let g = ctx.createGain();

    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.linearRampToValueAtTime(1200, t + 0.25);

    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.9, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);

    osc.connect(g);
    g.connect(gain);

    osc.start(t);
    osc.stop(t + 0.5);

    t += 0.5;
  }
}

window.onload = () => {
  setTimeout(()=>{
    playDangerAlarm(40000);
  },10000);
};
</script>
</body>
</html>
